# Render.com-style blueprint: deploy the Telegram worker with Docker.
# Point Docker context to the repository root and use telegram-bot/Dockerfile.
# Set these secrets in the dashboard (or via sync: false placeholders):
#   TELEGRAM_BOT_TOKEN, APP_BASE_URL, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# ---
services:
  - type: worker
    name: reminderrocket-telegram
    runtime: docker
    dockerfilePath: ./telegram-bot/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
